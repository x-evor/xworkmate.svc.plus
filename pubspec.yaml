name: xworkmate
description: "XWorkmate desktop-first AI workspace shell."
publish_to: 'none'

version: 1.1.0+4
build-date: 2026-03-28
build-id: f153d7b

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cryptography: ^2.6.1
  crypto: ^3.0.6
  device_info_plus: ^11.5.0
  ffi: ^2.1.4
  file_selector: ^1.0.3
  flutter_html: ^3.0.0
  flutter_markdown: ^0.7.7+1
  http: ^1.5.0
  markdown: ^7.3.0
  mobile_scanner: ^6.0.7
  package_info_plus: ^8.3.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  super_clipboard: ^0.9.0
  web_socket_channel: ^3.0.3
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  golden_toolkit: ^0.15.0
  patrol: ^3.13.0
  flutter_lints: ^6.0.0

dependency_overrides:
  # Keep debug info in the bundled native asset so archive builds can emit
  # a matching dSYM for App Store symbol upload.
  objective_c:
    path: third_party/objective_c
  # Use a local patch so Cargokit can recover from transient GitHub asset
  # download failures during macOS packaging.
  super_native_extensions:
    path: third_party/super_native_extensions

flutter:
  uses-material-design: true
  assets:
    - config/feature_flags.yaml
    - assets/branding/
    - assets/aris/manifest.json
    - assets/aris/skills/
    - assets/aris/mcp-servers/
