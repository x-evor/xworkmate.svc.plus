release_policy:
  debug: [stable, beta, experimental]
  profile: [stable, beta]
  release: [stable]

mobile:
  navigation:
    assistant:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile assistant destination
      ui_surface: mobile_shell
    settings:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile settings destination
      ui_surface: mobile_shell
  assistant:
    direct_ai:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile direct AI assistant mode
      ui_surface: assistant_page
    local_gateway:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile local gateway assistant mode
      ui_surface: assistant_page
    relay_gateway:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile relay gateway assistant mode
      ui_surface: assistant_page
    file_attachments:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile file attachment action in assistant composer
      ui_surface: assistant_page
    multi_agent:
      enabled: true
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile multi-agent assistant controls
      ui_surface: assistant_page
    local_runtime:
      enabled: false
      release_tier: experimental
      build_modes: []
      description: Mobile does not expose desktop runtime controls
      ui_surface: assistant_page
  settings:
    gateway:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile bridge and integration settings
      ui_surface: settings_page
    account_access:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile account access settings
      ui_surface: settings_page
    vault_server:
      enabled: true
      release_tier: stable
      build_modes: [debug, profile, release]
      description: Mobile vault server settings
      ui_surface: settings_page
    gateway_self_hosted_base:
      enabled: false
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile self-hosted gateway base controls
      ui_surface: settings_page
    gateway_advanced_custom_mode:
      enabled: false
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile advanced gateway override controls
      ui_surface: settings_page
    gateway_setup_code:
      enabled: false
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile gateway setup code editor
      ui_surface: settings_page
    experimental_canvas:
      enabled: true
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile experimental canvas host toggle
      ui_surface: settings_page
    experimental_bridge:
      enabled: true
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile experimental bridge toggle
      ui_surface: settings_page
    experimental_debug:
      enabled: true
      release_tier: experimental
      build_modes: [debug, profile, release]
      description: Mobile experimental debug runtime toggle
      ui_surface: settings_page

